      </div>
      <div class="hero">

      <div class="search">
        <input
          type="text"
          class="search-bar"

      <div id="pillsDiv" class="pills-container">
        <a href="eat" class="pills eat"
          >Eat <i class="fa-solid fa-utensils"></i>

        </a>
        <a href="eat" class="pills adv"

          <i class="fa-solid fa-person-hiking"></i>
          <span id="pincount" class="pins-textad"> 5 pins </span>
        </a>
        <a href="eat" class="pills shop"
          >Shopping
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="pincount" class="pins-textsh"> 6 pins</span>
